<form
  *ngIf="form"
  [formGroup]="form"
  class="lab900-form"
  [autocomplete]="setting?.disableBrowserAutocomplete ? 'off' : 'on'"
>
  <div class="lab900-form__inner">
    <ng-container
      *ngFor="let field of formFields$ | async"
      lab900FormField
      [schema]="field"
      [group]="form"
    ></ng-container>
  </div>
</form>

<ng-container *ngIf="showRow$ | async">
  <div
    [hidden]="isHidden(schema) | async"
    class="lab900-form-column {{ rowClass$ | async }}"
  >
    <span
      *ngIf="rowTitle$ | async as title"
      class="lab900-form-field-label lab900-form-column-label {{
        rowTitleClass$ | async
      }}"
      >{{ title | translate }}</span
    >
    <div class="form-column" [class.mobile-cols]="mobileCols$ | async">
      <div
        *ngFor="let field of nestedFields$ | async"
        [class.hidden]="isHidden(field) | async"
        lab900FormField
        [schema]="field"
        [group]="columnGroup$ | async"
      >
        <div class="form-col__info" *ngIf="field?.options?.infoTooltip as tip">
          <mat-icon [matTooltip]="tip?.text | translate">{{
            tip?.icon || 'info'
          }}</mat-icon>
        </div>
      </div>
      -
    </div>
  </div>
</ng-container>

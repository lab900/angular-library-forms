<div [formGroup]="group$ | async" *ngIf="(hideField$ | async) === false">
  <div
    *ngIf="label$ | async as label"
    class="lab900-radio-buttons-field__label"
  >
    <mat-label>{{ label | translate }}</mat-label>
  </div>
  <mat-radio-group
    [formControlName]="fieldAttribute$ | async"
    [color]="color$ | async"
    [required]="fieldIsRequired"
  >
    <mat-radio-button
      *ngFor="let value of radioOptions$ | async"
      [value]="value.value"
      [disabled]="value.disabled"
      >{{ value.label | translate }}</mat-radio-button
    >
  </mat-radio-group>
  <div class="radio-buttons-field__error" *ngIf="showErrors$ | async">
    <mat-error>
      <lab900-form-field-error />
    </mat-error>
  </div>
</div>

<div
  [formGroup]="group$ | async"
  *ngIf="(hideField$ | async) === false"
>
  <div *ngIf="label$ | async as label" class="lab900-slide-toggle-field__title">
    <mat-label>{{ schema.title | translate }}</mat-label>
  </div>
  <mat-slide-toggle
    [disabled]="disabled$ | async"
    [formControlName]="fieldAttribute$ | async"
    [required]="fieldIsRequired"
    [color]="color$ | async"
    [labelPosition]="labelPosition$ | async"
  >
    {{ label$ | async | translate }}
  </mat-slide-toggle>
  <mat-error
    class="lab900-slide-toggle-field__error"
    *ngIf="touched && !valid && !readonlyField$ | async"
    >
    <lab900-form-field-error/>
  </mat-error
  >
</div>

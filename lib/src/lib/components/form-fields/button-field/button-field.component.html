<div *ngIf="(hideField$ | async) === false">
  <div *ngIf="label$ | async as label" class="lab900-button-field__label">
    <mat-label>{{ label | translate }}</mat-label>
  </div>
  <lab900-button
    [type]="type$ | async"
    [color]="color$ | async"
    [disabled]="disabled$ | async"
    (btnClick)="handleClick($event)"
    [label]="buttonLabel$ | async"
    [matTooltip]="(tooltip$ | async)?.text | translate"
    [matTooltipPosition]="(tooltip$ | async)?.position || 'above'"
    [prefixIcon]="prefixIcon$ | async"
    [suffixIcon]="suffixIcon$ | async"
    [svgIcon]="svgIcon$ | async"
    [containerClass]="containerClass$ | async"
    [buttonType]="'button'"
  ></lab900-button>
</div>

<lab900-form-field
  *ngIf="(hideField$ | async) === false"
  [formGroup]="group$ | async"
  [icon]="icon$ | async"
  [suffix]="suffix$ | async"
  [prefix]="prefix$ | async"
  [maxLength]="maxLength$ | async"
>
  <input
    #input
    matInput
    class="mat-mdc-input-element mat-mdc-form-field-input-control mdc-text-field__input"
    [style.text-align]="align$ | async"
    [type]="type$ | async"
    [placeholder]="(placeholder$ | async) ?? '' | translate"
    [formControlName]="fieldAttribute$ | async"
    [required]="requiredField$ | async"
    [readonly]="readonlyField$ | async"
    [class.readonly]="readonlyField$ | async"
    [mask]="fieldMask$ | async"
    [prefix]="maskPrefix$ | async"
    [suffix]="maskSuffix$ | async"
    [placeHolderCharacter]="placeHolderCharacter$ | async"
    [dropSpecialCharacters]="dropSpecialCharacters$ | async"
    [allowNegativeNumbers]="allowNegativeNumbers$ | async"
    [showMaskTyped]="showMaskTyped$ | async"
    [decimalMarker]="decimalMarker$ | async"
    [thousandSeparator]="thousandSeparator$ | async"
    [lab900InputAutofocus]="autofocus$ | async"
    [style]="style$ | async"
  />
</lab900-form-field>

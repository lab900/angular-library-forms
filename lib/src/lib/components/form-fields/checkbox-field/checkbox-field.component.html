<div [formGroup]="group$ | async" *ngIf="(hideField$ | async) === false">
  <mat-checkbox
    [color]="color$ | async"
    [formControlName]="fieldAttribute$ | async"
    [indeterminate]="disabledIndeterminate$ | async"
  >
    {{ label$ | async | translate }}
  </mat-checkbox>
  <div
    *ngIf="(readonlyField$ | async) === false"
    class="subscript-wrapper"
    [@transitionMessages]="valid ? 'void' : 'enter'"
  >
    <mat-hint *ngIf="hint$ | async as hint">
      <span
        [innerHTML]="hint.value | translate : hint.valueTranslateData"
      ></span>
    </mat-hint>
    <mat-error>
      <lab900-form-field-error />
    </mat-error>
  </div>
</div>

<div
  [formGroup]="group$ | async"
  *ngIf="(hideField$ | async) === false"
  [class.fixed-list]="fixedList$ | async"
>
  <div [formArrayName]="fieldAttribute$ | async">
    <span
      *ngIf="label$ | async as label"
      class="lab900-form-field-label lab900-form-field-label--with-info"
    >
      {{ label | translate }}
      <mat-icon
        *ngIf="tooltip$ | async as tip"
        [matTooltip]="tip?.text | translate"
      >
        {{ tip?.icon || 'info' }}
      </mat-icon>
    </span>

    <ng-container *ngIf="repeaterArray$ | async as repeaterArray">
      <div
        *ngFor="let control of repeaterArray.controls; let i = index"
        class="repeater-row"
      >
        <div class="repeater-row__fields">
          <ng-container
            *ngFor="let field of nestedFields$ | async"
            lab900FormField
            [schema]="field"
            [group]="$any(control)"
          ></ng-container>
        </div>
        <div *ngIf="showActions$ | async" class="repeater-row__actions">
          <button
            type="button"
            *ngIf="canRemoveRow(i + 1) | async"
            (click)="removeFromArray(i)"
            mat-mini-fab
            class="mat-elevation-z0"
            [color]="buttonColor$ | async"
            aria-label="Delete"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>
      <mat-error
        class="subscript-wrapper"
        *ngIf="showErrors$ | async"
        [@transitionMessages]="valid ? 'void' : 'enter'"
        >{{ controlError$ | async }}</mat-error
      >
      <div *ngIf="showActions$ | async" class="repeater-field__actions">
        <button
          mat-button
          color="primary"
          [disabled]="disableAdd$ | async"
          (click)="addToArray()"
          class="repeater-add"
        >
          {{ addLabel$ | async | translate }}
        </button>
      </div>
    </ng-container>
  </div>
</div>

<ng-container *ngIf="(hideField$ | async) === false">
  <div
    [formGroup]="group$ | async"
    *ngIf="(readonlyField$ | async) === false; else readonlyFieldTemplate"
  >
    <div
      *ngIf="label$ | async as label"
      class="lab900-button-toggle-field__label"
    >
      <mat-label>{{ label | translate }}</mat-label>
    </div>
    <mat-button-toggle-group
      [formControlName]="fieldAttribute$ | async"
      [required]="requiredField$ | async"
    >
      <mat-button-toggle
        *ngFor="let value of buttonOptions$ | async"
        [value]="value.value"
        [matTooltip]="value?.tooltip?.text | translate"
        [matTooltipPosition]="value?.tooltip?.position || 'above'"
        class="{{ value?.buttonClass }}"
      >
        <lab900-icon
          [icon]="value.icon"
          *ngIf="value?.icon?.position === 'left'"
        ></lab900-icon>
        <ng-container *ngIf="value.label">
          {{ value.label | translate }}
        </ng-container>
        <lab900-icon
          [icon]="value.icon"
          *ngIf="!value?.icon?.position || value.icon.position === 'right'"
        ></lab900-icon>
      </mat-button-toggle>
    </mat-button-toggle-group>
    <mat-error *ngIf="showErrors$ | async">
      <lab900-form-field-error />
    </mat-error>
  </div>
  <ng-template #readonlyFieldTemplate>
    <div class="lab900-readonly-field">
      <span
        *ngIf="readonlyTitle$ | async as readonlyTitle"
        class="lab900-readonly-field__label"
        >{{ readonlyTitle | translate }}</span
      >
      <div [innerHTML]="readonlyLabel$ | async | translate"></div>
    </div>
  </ng-template>
</ng-container>

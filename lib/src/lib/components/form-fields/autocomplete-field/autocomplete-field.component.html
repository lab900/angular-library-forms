<lab900-form-field
  [formGroup]="group$ | async"
  *ngIf="(hideField$ | async) === false"
  [icon]="{ name: 'search', position: 'right' }"
>
  <input
    #input
    (input)="inputChanged($event)"
    [formControlName]="fieldAttribute$ | async"
    [matAutocomplete]="auto"
    [readonly]="readonlyField$ | async"
    [required]="requiredField$ | async"
    matInput
    placeholder="{{ (placeholder$ | async) ?? '' | translate }}"
    type="text"
    class="mat-mdc-input-element mat-mdc-form-field-input-control mdc-text-field__input"
  />

  <mat-autocomplete
    #auto="matAutocomplete"
    [displayWith]="options.displayInputFn"
  >
    <mat-option
      *ngFor="let option of filteredOptions | async"
      [value]="option?.value"
      [disabled]="option?.disabled"
    >
      <div
        *ngIf="options?.displayOptionFn"
        [innerHTML]="options.displayOptionFn(option) | translate"
      ></div>
      <div
        *ngIf="!options?.displayOptionFn"
        [innerHTML]="option.label | translate"
      ></div>
    </mat-option>
  </mat-autocomplete>
</lab900-form-field>

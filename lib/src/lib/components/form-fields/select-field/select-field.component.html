  <lab900-form-field
    *ngIf="(hideField$ | async) === false"
    [formGroup]="group$ | async"
    [class.has-value]="(controlValue$ | async)?.length"
  >
    <mat-select
      #select
      placeholder="{{ (placeholder$ | async) ?? '' | translate }}"
      [compareWith]="compareWith$ | async"
      [formControlName]="fieldAttribute$ | async"
      [multiple]="multiple$ | async"
      [required]="requiredField$ | async"
      [lab900InfiniteScroll]="infiniteScroll$ | async"
      [panelWidth]="panelWidth$ | async"
      [panelClass]="panelClass$ | async"
      (infiniteScroll)="onScroll()"
      (openedChange)="onOpenedChange($event)"
    >
      <lab900-select-field-search
          *ngIf="search$ | async as search"
          [search]="search"
          [searchQuery]="searchQuery$ | async"
          (searchQueryChange)="onSearch($event)"
          [searching]="loading$ | async"
          [disableScrollToActiveOnOptionsChanged]="
            (infiniteScroll$ | async)?.enabled
          "
      />
      <lab900-select-field-select-all
          *ngIf="selectAll$ | async as selectAll"
          [selectAll]="selectAll"
          (toggleSelectAll)="handleToggleAllSelection($event)"
      />
      <mat-option
        *ngFor="let item of (selectOptions$ | async)"
        [value]="item.value"
        [disabled]="item.disabled "
      >
        <div
          *ngIf="options?.displayOptionFn"
          [innerHTML]="options.displayOptionFn(item) | translate"
        ></div>
        <div
          *ngIf="!options?.displayOptionFn"
          [innerHTML]="item.label | translate"
        ></div>
      </mat-option>
    </mat-select>
    <button
      *ngIf="showClearButton$ | async"
      matSuffix
      mat-icon-button
      type="button"
      aria-label="Clear"
      (click)="handleClear($event)"
    >
      <mat-icon>close</mat-icon>
    </button>
  </lab900-form-field>

  <div class="lab900-readonly-field" *ngIf="readonlyField$ | async">
   <!-- <span

    <div *ngIf="loading$.value && fieldControl.value">
      {{ 'form.field.loading' | translate }}

<lab900-form-field
  *ngIf="(hideField$ | async) === false"
  [formGroup]="group$ | async"
>
  <input
    matInput
    type="text"
    placeholder="{{ (placeholder$ | async) ?? '' | translate }}"
    [formControlName]="fieldAttribute$ | async"
    [required]="requiredField$ | async"
    [options]="options"
    [readonly]="readonlyField$ | async"
    [class.readonly]="readonlyField$ | async"
    [style]="options?.style || ''"
    lab900InputAutofocus
    lab900SearchInput
    #searchRef="lab900SearchInput"
    #inputRef
    class="mat-mdc-input-element mat-mdc-form-field-input-control mdc-text-field__input"
  />
  <button
    mat-icon-button
    matSuffix
    [color]="addNewBtnColor$ | async"
    *ngIf="!!inputRef.value && (searchRef?.noResult$ | async) === true"
    (click)="handleAddNew(inputRef.value)"
    [matTooltip]="
      addNewLabel$ | async | translate : { searchQuery: inputRef.value }
    "
    style="align-items: flex-start"
  >
    <mat-icon>add</mat-icon>
  </button>
  <button
    *ngIf="showClearButton$ | async"
    matSuffix
    mat-icon-button
    type="button"
    aria-label="Clear"
    (click)="clear(inputRef)"
  >
    <mat-icon>close</mat-icon>
  </button>
  <mat-spinner
    *ngIf="(searchRef?.searching$ | async) === true"
    matSuffix
    diameter="16"
    style="display: inline-flex"
  ></mat-spinner>
  <mat-hint *ngIf="!!inputRef.value && (searchRef?.noResult$ | async) === true">
    {{ notFoundLabel$ | async | translate : { value: inputRef.value } }}
  </mat-hint>
</lab900-form-field>

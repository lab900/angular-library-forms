<div
  [formGroup]="group$ | async"
  *ngIf="(hideField$ | async) === false"
  style="padding-bottom: 1.34375em"
>
  <lab900-multi-lang-field-control
    [formControlName]="fieldAttribute$ | async"
    [defaultLanguage]="form?.language"
    [availableLanguages]="form?.availableLanguages"
    [required]="fieldIsRequired"
    [readonly]="readonlyField$ | async"
    [label]="title$ | async"
    [buttonColor]="buttonColor$ | async"
    [translateLabel]="translateLabel$ | async"
    [stopTranslateLabel]="stopTranslateLabel$ | async"
    [useTextAreaField]="useTextAreaField$ | async"
  ></lab900-multi-lang-field-control>
  <mat-error *ngIf="showErrors$ | async">
    <lab900-form-field-error/>
  </mat-error>
</div>

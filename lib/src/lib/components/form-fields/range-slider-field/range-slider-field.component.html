<div [formGroup]="group$ | async" *ngIf="(hideField$ | async) === false">
  <span
    *ngIf="label$ | async as label"
    class="lab900-form-field-label"
    translate
    >{{ label }}</span
  >
  <lab900-mat-range-slider-field
    [formControlName]="fieldAttribute$ | async"
    [fromLabel]="fromLabel$ | async"
    [toLabel]="toLabel$ | async"
    [min]="min$ | async"
    [max]="max$ | async"
    [steps]="steps$ | async"
    [format]="format$ | async"
    [required]="requiredField$ | async"
  ></lab900-mat-range-slider-field>
  <div
    class="radio-buttons-field__error"
    *ngIf="showErrors$ | async"
  >
    <mat-error>
      <lab900-form-field-error />
    </mat-error>
  </div>
</div>

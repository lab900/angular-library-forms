<lab900-form-field
  [formGroup]="group$ | async"
  *ngIf="(hideField$ | async) === false"
>
  <mat-date-range-input
    *ngIf="dateFormGroup"
    [formGroup]="dateFormGroup"
    [rangePicker]="picker"
  >
    <input
      matStartDate
      [formControl]="dateFormGroup.get(this.options?.startKey || 'start')"
      placeholder="{{ startLabel$ | async | translate }}"
    />
    <input
      matEndDate
      [formControl]="dateFormGroup.get(this.options?.endKey || 'end')"
      placeholder="{{ endLabel$ | async | translate }}"
    />
  </mat-date-range-input>
  <mat-datepicker-toggle
    [disabled]="disabled$ | async"
    matSuffix
    [for]="picker"
  ></mat-datepicker-toggle>
  <mat-date-range-picker
    [disabled]="disabled$ | async"
    #picker
  ></mat-date-range-picker>
</lab900-form-field>

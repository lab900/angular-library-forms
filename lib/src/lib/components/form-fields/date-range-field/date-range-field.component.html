<lab900-form-field
  [formGroup]="group$ | async"
  *ngIf="(hideField$ | async) === false"
>
  <mat-date-range-input [formGroup]="dateGroup$ | async" [rangePicker]="picker">
    <input
      matStartDate
      [formControlName]="startAttr$ | async"
      [placeholder]="startLabel$ | async | translate"
    />
    <input
      matEndDate
      [formControlName]="endAttr$ | async"
      [placeholder]="endLabel$ | async | translate"
    />
  </mat-date-range-input>
  <mat-datepicker-toggle
    [disabled]="disabled$ | async"
    matSuffix
    [for]="picker"
  ></mat-datepicker-toggle>
  <mat-date-range-picker
    [disabled]="disabled$ | async"
    #picker
  ></mat-date-range-picker>
</lab900-form-field>

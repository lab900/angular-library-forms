<lab900-form-field
  [formGroup]="group$ | async"
  *ngIf="(hideField$ | async) === false"
  [icon]="{ name: 'search', position: 'right' }"
>
  <mat-chip-grid #chipList [formControlName]="fieldAttribute$ | async">
    <mat-chip-row
      *ngFor="let opt of selectedOptions; let i = index"
      [removable]="!readonlyField$ | async"
      selectable
      (removed)="remove(i)"
    >
      <div [innerHTML]="options.displayInputFn(opt) | translate"></div>
      <mat-icon *ngIf="!readonlyField$ | async" matChipRemove>cancel</mat-icon>
    </mat-chip-row>
    <input
      #input
      (input)="inputChanged($event)"
      placeholder="{{ (placeholder$ | async) ?? '' | translate }}"
      [readOnly]="readonlyField$ | async"
      [matAutocomplete]="auto"
      [matChipInputFor]="chipList"
      [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
    />
  </mat-chip-grid>
  <mat-autocomplete #auto="matAutocomplete" (optionSelected)="selected($event)">
    <mat-option
      *ngFor="let option of filteredOptions | async"
      [value]="option?.value"
      [disabled]="option?.disabled"
    >
      <div
        *ngIf="options?.displayOptionFn"
        [innerHTML]="options.displayOptionFn(option) | translate"
      ></div>
      <ng-container *ngIf="!options?.displayOptionFn">{{
        option.label | translate
      }}</ng-container>
    </mat-option>
  </mat-autocomplete>
</lab900-form-field>

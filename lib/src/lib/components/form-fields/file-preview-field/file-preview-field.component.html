<div class="file-preview-component">
  <input
    #fileField
    type="file"
    style="display: none"
    [multiple]="multiple$ | async"
    [accept]="accept$ | async"
    (change)="fileChange($event)"
  />
  <button
    *ngIf="(readonlyField$ | async) === false"
    mat-raised-button
    color="primary"
    (click)="fileField.click()"
  >
    {{ fileUploadButtonText$ | async | translate }}
  </button>
  <div class="images-wrapper" *ngIf="controlValue$ | async as files">
    <ng-container *ngFor="let file of files">
      <mat-card
        appearance="outlined"
        class="image-wrapper"
        (click)="handleImageClick(file)"
      >
        <mat-icon
          *ngIf="(readonlyField$ | async) === false"
          (click)="$event.stopPropagation(); removeFile(file)"
          class="delete-image"
          >close</mat-icon
        >
        <ng-container *ngIf="showOverlay$ | async; else noOverlay">
          <div
            *ngIf="overlay$ | async as overlay"
            class="image"
            [style.background-color]="overlay.backgroundColor"
            [style.color]="overlay.textColor"
          >
            <span>
              {{ overlay.text | translate }}
            </span>
          </div>
        </ng-container>
        <ng-template #noOverlay>
          <div
            lab900AuthImage
            class="image"
            [image]="file"
            [httpCallback]="options?.httpCallback"
          ></div>
        </ng-template>
        <div class="file-name">
          <p
            *ngIf="file.fileName"
            [class.ellipse]="!!file.imageSrc"
            [matTooltip]="file.fileName"
          >
            {{ file.fileName }}
          </p>
          <mat-icon
            *ngIf="canEditFileMetaData$ | async"
            (click)="$event.stopPropagation(); openPreviewDialog(file)"
            >visibility</mat-icon
          >
        </div>
      </mat-card>
    </ng-container>
  </div>
</div>

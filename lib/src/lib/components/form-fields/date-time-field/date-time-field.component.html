<lab900-form-field
  [formGroup]="group$ | async"
  *ngIf="(hideField$ | async) === false"
>
  <input
    matInput
    placeholder="{{ (placeholder$ | async) ?? '' | translate }}"
    [ngxMatDatetimePicker]="picker"
    [formControlName]="fieldAttribute$ | async"
    [required]="requiredField$ | async"
    [max]="maxDate$ | async"
    [min]="minDate$ | async"
    class="mat-mdc-input-element mat-mdc-form-field-input-control mdc-text-field__input"
  />

  <ngx-mat-datepicker-toggle
    matSuffix
    [for]="picker"
  ></ngx-mat-datepicker-toggle>
  <ngx-mat-datetime-picker
    #picker
    [showSpinners]="true"
    [showSeconds]="showSeconds$ | async"
    [startView]="startView$ | async"
    [defaultTime]="defaultTime$ | async"
    [stepMinute]="stepMinute$ | async"
  ></ngx-mat-datetime-picker>
</lab900-form-field>

<div class="upload-file" [class.upload-file--compact]="compact$ | async">
  <div
    lab900DropFile
    class="upload-file__container"
    [class.upload-file__container--compact]="isCompact$ | async"
    (fileDropped)="handleFileList($event)"
    (click)="fileField.click()"
  >
    <div class="instructions">
      <mat-icon class="instructions__upload-icon">upload_file</mat-icon>
      <span class="instructions__DD-text text-ellipsis">
        {{ dropFilesText$ | async | translate }}
      </span>
      <div class="instructions__or-text-container">
        <hr />
        <span class="text-ellipsis">{{ 'OR' | translate }}</span>
        <hr />
      </div>
      <button
        (click)="fileField.click(); $event.stopPropagation()"
        color="primary"
        class="instructions__upload-button text-ellipsis"
        mat-flat-button
      >
        {{ dropFilesBtn$ | async | translate }}
      </button>
    </div>
    <input
      #fileField
      (change)="handleInput($event.target)"
      hidden
      type="file"
      [multiple]="multiple$ | async"
    />
  </div>
  <ng-container *ngIf="controlValue$ | async as files">
    <div
      class="file-list"
      [class.file-list--compact]="compact$ | async"
      *ngIf="!!files?.length"
    >
      <div class="file" *ngFor="let file of files">
        <span class="file__icon"><mat-icon>description</mat-icon></span>
        <div class="file__info">
          <div class="text-ellipsis">{{ file.name }}</div>
          {{ formatBytes(file.size) }}
        </div>
        <button
          mat-icon-button
          class="file__icon"
          (click)="deleteFile(file, files)"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
  </ng-container>
</div>
